<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toplu Resim İndirici (ZIP Paketleyici)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ZIP oluşturmak için gerekli kütüphane -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full space-y-6">
        <!-- Başlık Kartı -->
        <div class="glass border border-slate-200 rounded-2xl p-8 shadow-xl">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Toplu Resim Paketleyici</h1>
            </div>
            <p class="text-slate-500 mb-6">Metni yapıştırın, dosya adını belirleyin ve ZIP olarak indirin.</p>

            <!-- Giriş Alanı -->
            <div class="space-y-4">
                <div class="relative">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Resim URL'lerini İçeren Metin</label>
                    <textarea 
                        id="urlInput" 
                        class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm font-mono text-slate-600"
                        placeholder="Hücre içeriğini buraya yapıştırın..."
                    ></textarea>
                    <div id="urlCountLabel" class="absolute bottom-3 right-3 bg-white px-2 py-1 rounded border border-slate-200 text-xs text-slate-400 font-medium">
                        0 URL algılandı
                    </div>
                </div>

                <!-- Dosya Adı Girişi -->
                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <label for="zipNameInput" class="block text-sm font-semibold text-blue-800 mb-2">Klasör Adı Ne Olsun?</label>
                    <div class="flex items-center gap-2">
                        <input 
                            type="text" 
                            id="zipNameInput" 
                            class="flex-1 p-3 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            placeholder="Örn: Tatil_Resimleri"
                            value="Öğrenci Adı vb."
                        >
                        <div id="datePreview" class="text-xs text-blue-500 font-mono bg-white px-3 py-3 border border-blue-200 rounded-lg">
                            _tarih.zip
                        </div>
                    </div>
                    <p class="text-[10px] text-blue-400 mt-2 font-medium text-center">Örnek: <span id="fullPreview" class="font-bold">resim_paketi_17_nisan_2026.zip</span></p>
                </div>
            </div>

            <!-- Kontroller -->
            <div class="mt-6 flex flex-col gap-4">
                <button 
                    onclick="startZipDownload()" 
                    id="mainBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2 disabled:bg-slate-300 disabled:shadow-none"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    <span>Paketle ve ZIP Olarak İndir</span>
                </button>

                <!-- İlerleme Alanı -->
                <div id="progressSection" class="hidden space-y-3">
                    <div class="flex justify-between text-sm font-medium">
                        <span id="statusText" class="text-slate-600">Resimler hazırlanıyor...</span>
                        <span id="percentText" class="text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Hata Paneli -->
            <div id="errorPanel" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
                <div class="flex items-start gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <div class="text-sm text-red-700" id="errorMessage">
                        Bir hata oluştu.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const zipNameInput = document.getElementById('zipNameInput');
        const datePreview = document.getElementById('datePreview');
        const fullPreview = document.getElementById('fullPreview');
        const urlCountLabel = document.getElementById('urlCountLabel');
        const mainBtn = document.getElementById('mainBtn');
        const progressSection = document.getElementById('progressSection');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const percentText = document.getElementById('percentText');
        const errorPanel = document.getElementById('errorPanel');
        const errorMessage = document.getElementById('errorMessage');

        const turkishMonths = [
            "ocak", "şubat", "mart", "nisan", "mayıs", "haziran", 
            "temmuz", "ağustos", "eylül", "ekim", "kasım", "aralık"
        ];

        function getFormattedDateSuffix() {
            const d = new Date();
            const day = d.getDate();
            const month = turkishMonths[d.getMonth()];
            const year = d.getFullYear();
            return `_${day}_${month}_${year}`;
        }

        function updatePreview() {
            const suffix = getFormattedDateSuffix();
            const base = zipNameInput.value.trim() || "resim_paketi";
            datePreview.innerText = suffix + ".zip";
            fullPreview.innerText = base + suffix + ".zip";
        }

        // İlk yükleme ve input takibi
        updatePreview();
        zipNameInput.addEventListener('input', updatePreview);

        function showError(msg) {
            errorPanel.classList.remove('hidden');
            errorMessage.innerText = msg;
        }

        urlInput.addEventListener('input', () => {
            const urls = extractUrls(urlInput.value);
            urlCountLabel.innerText = `${urls.length} URL algılandı`;
            errorPanel.classList.add('hidden');
        });

        function extractUrls(text) {
            if (!text) return [];
            const regex = /https?:\/\/[^\s"'<>]+/g;
            return text.match(regex) || [];
        }

        async function startZipDownload() {
            errorPanel.classList.add('hidden');
            const text = urlInput.value.trim();
            const urls = extractUrls(text);
            const baseFileName = zipNameInput.value.trim() || "resim_paketi";

            if (urls.length === 0) {
                showError("Lütfen geçerli resim bağlantıları içeren bir metin yapıştırın.");
                return;
            }

            mainBtn.disabled = true;
            progressSection.classList.remove('hidden');
            
            const zip = new JSZip();
            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                const displayCount = i + 1;
                statusText.innerText = `İndiriliyor: ${displayCount} / ${urls.length}`;

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("HTTP " + response.status);
                    const blob = await response.blob();

                    const urlObj = new URL(url);
                    let fileName = urlObj.pathname.substring(urlObj.pathname.lastIndexOf('/') + 1);
                    const idParam = new URLSearchParams(urlObj.search).get('id');
                    
                    if (!fileName || fileName.length < 3) {
                        fileName = idParam ? `${idParam}.png` : `resim_${displayCount}.png`;
                    } else if (idParam && !fileName.includes(idParam)) {
                        fileName = `${idParam}_${fileName}`;
                    }
                    if (!fileName.includes('.')) fileName += '.png';

                    zip.file(fileName, blob);
                    successCount++;
                } catch (err) {
                    console.error("Hata:", url, err);
                    failCount++;
                }

                const progressPercent = Math.round(((i + 1) / urls.length) * 100);
                progressBar.style.width = progressPercent + '%';
                percentText.innerText = progressPercent + '%';
            }

            if (successCount > 0) {
                statusText.innerText = "ZIP dosyası oluşturuluyor...";
                try {
                    const content = await zip.generateAsync({type: "blob"});
                    const zipUrl = URL.createObjectURL(content);
                    
                    // İndirme anındaki tarihi al (tam dinamiklik)
                    const finalZipName = `${baseFileName}${getFormattedDateSuffix()}.zip`;
                    
                    const link = document.createElement('a');
                    link.href = zipUrl;
                    link.download = finalZipName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(zipUrl);
                } catch (e) {
                    showError("ZIP oluşturulurken hata: " + e.message);
                }
            }

            statusText.innerText = `İşlem tamamlandı.`;
            mainBtn.disabled = false;

            if (failCount > 0) {
                showError(`${successCount} dosya paketlendi, ${failCount} dosya indirilemedi.`);
            }
        }
    </script>
</body>
</html>
